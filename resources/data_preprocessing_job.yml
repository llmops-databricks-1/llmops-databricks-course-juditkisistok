resources:
  jobs:
    data_preprocessing_job:
      name: data_preprocessing
      tags:
        project_name: "llmops-databricks-course-juditkisistok"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: data_preprocessing_task
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/01_preprocess.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
